name: tmux-title
version: 1.2.0
description: "Sync Hermes session title and status emoji (🔄 busy / 🚨 approval / 🛎️ done) to the tmux window name. Uses $TMUX_PANE to target the correct window even when the user switches tabs."
author: "draplater"
hooks:
  - on_session_title
  - pre_llm_call
  - post_llm_call
  - pre_approval_request
  - post_approval_response
