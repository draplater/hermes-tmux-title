name: tmux-title
version: 1.3.0
description: "Sync Hermes session title and status emoji (🔄 busy / 🚨 approval / 🛎️ done) to the tmux window name. Restores original window name on exit. Uses $TMUX_PANE to target the correct window."
author: "draplater"
hooks:
  - on_session_title
  - pre_llm_call
  - post_llm_call
  - pre_approval_request
  - post_approval_response
  - on_session_end
