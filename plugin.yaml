name: tmux-title
version: 1.3.1
description: "Sync Hermes session title and status emoji (🔄 busy / 🚨 approval / 🛎️ done) to the tmux window name. Restores original name on exit via atexit. Uses $TMUX_PANE."
author: "draplater"
hooks:
  - on_session_title
  - pre_llm_call
  - post_llm_call
  - pre_approval_request
  - post_approval_response
