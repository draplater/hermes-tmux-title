name: tmux-title
version: 1.4.0
description: "Sync Hermes session title and status emoji (🔄 busy / 🚨 approval / 🛎️ idle) to the tmux window name. Uses work-counter to stay busy during tool execution between LLM calls. Restores original name on exit via atexit."
author: "draplater"
hooks:
  - on_session_title
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
